<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hold The Line</title>
    <link rel="icon" href="/static/icon.png" type="image/png" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page-about">
    <header class="topbar">
      <div class="topbar-left">
        <a class="brand" href="#" data-page-link="simulation" aria-label="Hold The Line">
          <img src="/static/icon.png" alt="" onerror="this.classList.add('missing')" />
          <span class="brand-text-wrap">
            <span class="brand-text-base">Hold The Line</span>
            <span class="brand-text-red" aria-hidden="true">Hold The Line</span>
            <span class="brand-text-blue" aria-hidden="true">Hold The Line</span>
          </span>
        </a>
        <div class="control-group">
          <div class="field instance-field">
            <span class="field-label">Instance</span>
            <div class="select-wrap">
              <select id="instanceSelect"></select>
            </div>
            <div class="eye-wrap">
              <button type="button" id="eyeButton" class="eye-button" aria-label="View instance config" title="View instance config">
                <svg class="icon eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2.5 12s3.8-6.2 9.5-6.2S21.5 12 21.5 12s-3.8 6.2-9.5 6.2S2.5 12 2.5 12Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <path d="M2.5 12h19" stroke="currentColor" stroke-width="1.5" />
                </svg>
                <svg class="icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2.5 12s3.8-6.2 9.5-6.2S21.5 12 21.5 12s-3.8 6.2-9.5 6.2S2.5 12 2.5 12Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <circle cx="12" cy="12" r="3.1" fill="none" stroke="currentColor" stroke-width="1.5" />
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <span class="field-label">Policy</span>
            <button type="button" id="policyButton" class="policy-button">Configure</button>
          </div>
        </div>
      </div>

      <div class="topbar-center">
        <div class="playback-group">
          <button id="playPause" class="icon-button play-button" aria-label="Play" title="Play">
            <svg class="icon icon-play is-active" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7.5 4.8 L19 12 L7.5 19.2 Z" fill="currentColor" />
            </svg>
            <svg class="icon icon-pause" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="6" y="4.8" width="4.4" height="14.4" rx="1" fill="currentColor" />
              <rect x="13.6" y="4.8" width="4.4" height="14.4" rx="1" fill="currentColor" />
            </svg>
            <svg class="icon icon-resume" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4.5" y="4.8" width="3" height="14.4" rx="1" fill="currentColor" />
              <path d="M10.5 4.8 L21 12 L10.5 19.2 Z" fill="currentColor" />
            </svg>
          </button>
          <button id="step" class="icon-button" aria-label="Step forward one frame" title="Step forward one frame">
            <svg class="icon is-active" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.5 5.2 L13.5 12 L4.5 18.8 Z" fill="currentColor" />
              <rect x="16" y="5.2" width="3.2" height="13.6" rx="1" fill="currentColor" />
            </svg>
          </button>
          <button id="reset" class="icon-button" aria-label="Reset" title="Reset">
            <svg class="icon is-active" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 5V1.2L6.6 6 12 10.8V7a5 5 0 1 1 -4.9 6H4.9A7 7 0 1 0 12 5Z"
              />
            </svg>
          </button>
        </div>
      </div>

      <nav class="topnav topbar-right">
        <button class="nav-link active" data-page-link="about">About</button>
        <button class="nav-link" data-page-link="simulation">Simulator</button>
      </nav>
    </header>

    <div class="config-modal-overlay" id="configModalOverlay">
      <div class="config-modal" role="dialog" aria-modal="true" aria-labelledby="instanceConfigTitle">
        <button type="button" id="configModalClose" class="config-modal-close" aria-label="Close">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5 L19 19 M19 5 L5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <div class="config-popup-title" id="instanceConfigTitle">instance.json</div>
        <pre class="config-popup-body" id="instanceConfigBody">Loading…</pre>
      </div>
    </div>

    <div class="config-modal-overlay" id="policyModalOverlay">
      <div class="config-modal" role="dialog" aria-modal="true" aria-labelledby="policyModalTitle">
        <button type="button" id="policyModalClose" class="config-modal-close" aria-label="Close">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5 L19 19 M19 5 L5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <div class="config-popup-title" id="policyModalTitle">Policy</div>
        <div class="policy-modal-body">
          <div class="field policy-field">
            <span class="field-label"><span class="swatch blue"></span>Blue Team</span>
            <div class="select-wrap">
              <select id="policyBlue"></select>
            </div>
          </div>
          <div class="field policy-field">
            <span class="field-label"><span class="swatch red"></span>Red Team</span>
            <div class="select-wrap">
              <select id="policyRed"></select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <main class="page" id="simulationPage">
      <section class="sim-layout">
        <section class="main-stage">
          <section class="views" id="viewsContainer">
            <div class="view-big-slot" id="bigSlot"></div>
            <div class="view-thumb-col">
              <div class="view-thumb-slot" id="thumbSlot1"></div>
              <div class="view-thumb-slot" id="thumbSlot2"></div>
            </div>
          </section>

          <section class="below-views">
            <section class="metrics">
              <h2>Metrics</h2>
              <dl id="metrics"></dl>
            </section>
            <div class="terrain-toggle-group">
              <div class="terrain-toggle" role="group" aria-label="Map style">
                <button id="terrainRealistic" class="terrain-toggle-btn" type="button" aria-pressed="false" aria-label="Realistic map" title="Realistic map">
                  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                    <rect x="1" y="1" width="22" height="22" rx="4" fill="#c9c2a8" />
                    <rect x="2" y="16" width="6" height="6" fill="#9fbb84" />
                    <rect x="0" y="10" width="24" height="4" fill="#847d6e" />
                    <rect x="10" y="0" width="4" height="24" fill="#847d6e" />
                    <path d="M1 12 H6 M9 12 H15 M18 12 H23" stroke="#e9e4d4" stroke-width="1" stroke-linecap="round" />
                    <path d="M12 1 V6 M12 9 V15 M12 18 V23" stroke="#e9e4d4" stroke-width="1" stroke-linecap="round" />
                    <rect x="2" y="6" width="5" height="4" fill="#8f8570" />
                    <path d="M1.5 6 L4.5 2.5 L7.5 6 Z" fill="#5c4c3a" />
                    <rect x="17" y="5" width="5" height="5" fill="#7f8f9c" />
                    <path d="M16.5 5 L19.5 1.2 L22.5 5 Z" fill="#4d5860" />
                    <rect x="16" y="16" width="6" height="5" fill="#97836c" />
                    <path d="M15.3 16 L19 12 L22.7 16 Z" fill="#5c4c3a" />
                  </svg>
                </button>
                <button id="terrainConceptual" class="terrain-toggle-btn" type="button" aria-pressed="false" aria-label="Conceptual map" title="Conceptual map">
                  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                    <rect x="1" y="1" width="22" height="22" rx="4" fill="#08090a" />
                    <path d="M1 6 H23 M1 12 H23 M1 18 H23 M6 1 V23 M12 1 V23 M18 1 V23" stroke="#ffffff" stroke-width="1" />
                  </svg>
                </button>
              </div>
              <span class="terrain-toggle-label">View</span>
            </div>
            <section class="legend">
              <h2>Legend</h2>
              <div><span class="swatch blue"></span>Defenders</div>
              <div><span class="swatch red"></span>Scouts</div>
              <div><span class="swatch building"></span>Buildings</div>
            </section>
          </section>
        </section>

      </section>
    </main>

    <main class="page visible active" id="aboutPage">
      <section class="about-page">
        <h1>Hold The Line</h1>
        <p>Work in progress</p>
      </section>
    </main>
